<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>메이트 — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    html, body { overflow: auto; height: auto; }
    .app-wrapper { overflow: auto; height: auto; min-height: 100dvh; }

    /* ── 헤더 ── */
    .login-header {
      display: flex; align-items: center;
      padding: 52px 20px 0;
      gap: 4px;
    }
    .back-btn {
      background: none; border: none; cursor: pointer;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px; color: var(--color-text);
      font-size: 20px; flex-shrink: 0;
    }
    .back-btn:active { background: var(--color-gray2); }
    .header-logo {
      display: flex; align-items: center; gap: 7px;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: var(--color-primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #fff;
      letter-spacing: -0.5px;
    }
    .logo-text {
      font-size: 18px; font-weight: 900;
      letter-spacing: -1px; color: var(--color-text);
    }
    .logo-text span { color: var(--color-primary); }

    /* ── 탭 ── */
    .tab-wrap {
      display: flex; gap: 0;
      margin: 28px 20px 0;
      background: var(--color-gray2);
      border-radius: 14px; padding: 4px;
    }
    .tab-btn {
      flex: 1; padding: 11px 0;
      border: none; background: none; cursor: pointer;
      font-family: var(--font-main);
      font-size: 15px; font-weight: 700;
      border-radius: 10px;
      color: var(--color-gray1);
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #fff;
      color: var(--color-text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* ── 폼 영역 ── */
    .form-section {
      padding: 28px 20px 40px;
    }
    .form-section.hidden { display: none; }

    .form-title {
      font-size: 22px; font-weight: 900;
      letter-spacing: -0.5px; color: var(--color-text);
      margin-bottom: 6px;
    }
    .form-sub {
      font-size: 13px; color: var(--color-gray1);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── 입력 필드 ── */
    .field-group {
      margin-bottom: 16px;
    }
    .field-label {
      font-size: 13px; font-weight: 700;
      color: var(--color-text2); margin-bottom: 7px;
      display: block;
    }
    .field-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--color-gray2);
      border-radius: 14px;
      font-family: var(--font-main);
      font-size: 15px; color: var(--color-text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-input::placeholder { color: var(--color-gray1); }
    .field-input:focus { border-color: var(--color-primary); }
    .field-input.error { border-color: #EF4444; }

    .field-hint {
      font-size: 12px; color: var(--color-gray1);
      margin-top: 5px; display: block;
    }
    .field-hint.error-msg {
      color: #EF4444;
    }

    /* ── 비밀번호 강도 ── */
    .pw-strength {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .pw-bar {
      flex: 1; height: 3px; border-radius: 99px;
      background: var(--color-gray2);
      transition: background 0.3s;
    }
    .pw-bar.fill-weak   { background: #EF4444; }
    .pw-bar.fill-medium { background: #F59E0B; }
    .pw-bar.fill-strong { background: var(--color-primary); }
    .pw-strength-label {
      font-size: 11px; font-weight: 700;
      margin-top: 4px; display: block;
    }

    /* ── 체크박스 ── */
    .agree-row {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 10px; cursor: pointer;
    }
    .agree-check {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid var(--color-gray2);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; margin-top: 1px;
    }
    .agree-check.checked {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }
    .agree-check.checked::after {
      content: '✓'; color: #fff; font-size: 12px; font-weight: 900;
    }
    .agree-text {
      font-size: 13px; color: var(--color-text2); line-height: 1.5;
    }
    .agree-text a {
      color: var(--color-primary); text-decoration: none; font-weight: 700;
    }

    /* ── 메인 버튼 ── */
    .btn-submit {
      width: 100%; padding: 17px;
      background: var(--color-primary);
      border: none; border-radius: 16px; cursor: pointer;
      font-family: var(--font-main);
      font-size: 16px; font-weight: 900;
      color: #fff; letter-spacing: -0.3px;
      box-shadow: var(--shadow-btn);
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-submit:active { transform: scale(0.98); opacity: 0.92; }
    .btn-submit:disabled {
      background: var(--color-gray2);
      color: var(--color-gray1);
      box-shadow: none; cursor: not-allowed;
    }

    /* ── 소셜 로그인 구분선 ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 20px;
    }
    .divider-line {
      flex: 1; height: 1px; background: var(--color-gray2);
    }
    .divider-text {
      font-size: 12px; color: var(--color-gray1); white-space: nowrap;
    }

    /* ── 소셜 버튼 ── */
    .social-btns {
      display: flex; flex-direction: column; gap: 10px;
    }
    .btn-social {
      width: 100%; padding: 14px 20px;
      border: none; border-radius: 14px; cursor: pointer;
      font-family: var(--font-main);
      font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s; position: relative;
    }
    .btn-kakao {
      background: #FEE500; color: #191919;
    }
    .btn-naver {
      background: #03C75A; color: #fff;
    }
    .btn-social:active { transform: scale(0.98); }
    .social-soon {
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 6px;
      background: rgba(0,0,0,0.1); color: inherit;
      position: absolute; right: 16px;
    }
    .btn-naver .social-soon { background: rgba(255,255,255,0.25); }

    /* ── 비밀번호 찾기 / 회원가입 링크 ── */
    .bottom-links {
      display: flex; justify-content: center; gap: 20px;
      margin-top: 24px;
    }
    .link-btn {
      font-size: 13px; color: var(--color-gray1);
      background: none; border: none; cursor: pointer;
      font-family: var(--font-main); padding: 4px 0;
    }
    .link-btn.highlight { color: var(--color-primary); font-weight: 700; }
    .link-btn:active { opacity: 0.7; }

    /* ── 비밀번호 찾기 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0 0 0;
      transition: opacity 0.25s;
    }
    .modal-overlay.hidden { display: none; }
    .modal-sheet {
      background: #fff; border-radius: 24px 24px 0 0;
      padding: 28px 20px 48px; width: 100%; max-width: 430px;
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--color-gray2); border-radius: 99px;
      margin: 0 auto 24px;
    }
    .modal-title {
      font-size: 18px; font-weight: 900;
      letter-spacing: -0.5px; margin-bottom: 6px;
    }
    .modal-sub {
      font-size: 13px; color: var(--color-gray1);
      margin-bottom: 24px; line-height: 1.5;
    }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #191F28; color: #fff;
      border-radius: 12px; padding: 12px 20px;
      font-size: 13px; font-weight: 500;
      white-space: nowrap; z-index: 300;
      opacity: 0; transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>
  <div class="app-wrapper">

    <!-- 헤더 -->
    <div class="login-header">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="header-logo">
        <div class="logo-icon">M</div>
        <div class="logo-text">메이<span>트</span></div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="tab-wrap">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">로그인</button>
      <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">회원가입</button>
    </div>

    <!-- ── 로그인 폼 ── -->
    <div class="form-section" id="loginSection">
      <div class="form-title">다시 오셨군요!</div>
      <div class="form-sub">이메일과 비밀번호로 로그인하세요.</div>

      <div class="field-group">
        <label class="field-label">이메일</label>
        <input class="field-input" type="email" id="loginEmail"
          placeholder="example@email.com" autocomplete="email" />
      </div>

      <div class="field-group">
        <label class="field-label">비밀번호</label>
        <input class="field-input" type="password" id="loginPw"
          placeholder="비밀번호 입력" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()" />
        <span class="field-hint" id="loginErr" style="display:none"></span>
      </div>

      <button class="btn-submit" id="loginBtn" onclick="doLogin()">로그인</button>

      <div class="bottom-links">
        <button class="link-btn" onclick="openResetModal()">비밀번호 찾기</button>
        <button class="link-btn highlight" onclick="switchTab('register')">회원가입</button>
      </div>

      <!-- 소셜 로그인 (UI 전용) -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">또는 소셜 로그인</span>
        <div class="divider-line"></div>
      </div>

      <div class="social-btns">
        <button class="btn-social btn-kakao" onclick="showSocialComingSoon()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 1C4.58 1 1 3.84 1 7.36c0 2.22 1.47 4.17 3.69 5.29L3.7 16.6a.3.3 0 0 0 .44.34L8.6 14.1c.13.01.26.02.4.02 4.42 0 8-2.84 8-6.36S13.42 1 9 1z" fill="#3C1E1E"/>
          </svg>
          카카오로 계속하기
          <span class="social-soon">준비중</span>
        </button>
        <button class="btn-social btn-naver" onclick="showSocialComingSoon()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M9.12 8.26 6.6 4H4v8h2.88V7.74L9.4 12H12V4H9.12v4.26z" fill="white"/>
          </svg>
          네이버로 계속하기
          <span class="social-soon">준비중</span>
        </button>
      </div>
    </div>

    <!-- ── 회원가입 폼 ── -->
    <div class="form-section hidden" id="registerSection">
      <div class="form-title">처음 오셨군요!</div>
      <div class="form-sub">간단하게 가입하고 맞춤 혜택을 저장해보세요.</div>

      <div class="field-group">
        <label class="field-label">이름</label>
        <input class="field-input" type="text" id="regName"
          placeholder="실명 입력" autocomplete="name" maxlength="20" />
        <span class="field-hint" id="regNameErr" style="display:none"></span>
      </div>

      <div class="field-group">
        <label class="field-label">이메일</label>
        <input class="field-input" type="email" id="regEmail"
          placeholder="example@email.com" autocomplete="email" />
        <span class="field-hint" id="regEmailErr" style="display:none"></span>
      </div>

      <div class="field-group">
        <label class="field-label">비밀번호</label>
        <input class="field-input" type="password" id="regPw"
          placeholder="영문 + 숫자 + 특수문자 8자 이상"
          autocomplete="new-password" oninput="checkPwStrength()" />
        <div class="pw-strength" id="pwStrength">
          <div class="pw-bar" id="bar1"></div>
          <div class="pw-bar" id="bar2"></div>
          <div class="pw-bar" id="bar3"></div>
        </div>
        <span class="pw-strength-label" id="pwStrengthLabel" style="display:none"></span>
        <span class="field-hint" id="regPwErr" style="display:none"></span>
      </div>

      <div class="field-group">
        <label class="field-label">비밀번호 확인</label>
        <input class="field-input" type="password" id="regPwConfirm"
          placeholder="비밀번호 다시 입력" autocomplete="new-password" />
        <span class="field-hint" id="regPwConfirmErr" style="display:none"></span>
      </div>

      <div class="field-group">
        <label class="field-label">휴대폰 번호 <span style="font-weight:400;color:var(--color-gray1)">(선택)</span></label>
        <input class="field-input" type="tel" id="regPhone"
          placeholder="010-0000-0000" autocomplete="tel" maxlength="13"
          oninput="formatPhone(this)" />
        <span class="field-hint" id="regPhoneErr" style="display:none"></span>
      </div>

      <!-- 약관 동의 -->
      <div style="margin-bottom:20px">
        <div class="agree-row" onclick="toggleAgree('agreeAll')">
          <div class="agree-check" id="agreeAll"></div>
          <span class="agree-text" style="font-weight:700">전체 동의</span>
        </div>
        <div style="height:1px;background:var(--color-gray2);margin:8px 0 10px"></div>
        <div class="agree-row" onclick="toggleAgree('agreeTerms')">
          <div class="agree-check" id="agreeTerms"></div>
          <span class="agree-text">[필수] <a href="#" onclick="return false">이용약관</a> 동의</span>
        </div>
        <div class="agree-row" onclick="toggleAgree('agreePrivacy')">
          <div class="agree-check" id="agreePrivacy"></div>
          <span class="agree-text">[필수] <a href="#" onclick="return false">개인정보처리방침</a> 동의</span>
        </div>
        <div class="agree-row" onclick="toggleAgree('agreeMarketing')">
          <div class="agree-check" id="agreeMarketing"></div>
          <span class="agree-text">[선택] 마케팅 정보 수신 동의</span>
        </div>
        <span class="field-hint" id="agreeErr" style="display:none"></span>
      </div>

      <button class="btn-submit" id="registerBtn" onclick="doRegister()">가입하기</button>
    </div>

    <!-- 비밀번호 찾기 모달 -->
    <div class="modal-overlay hidden" id="resetModal" onclick="closeResetModal(event)">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">비밀번호 찾기</div>
        <div class="modal-sub">가입한 이메일로 재설정 링크를 보내드려요.</div>

        <div class="field-group">
          <label class="field-label">이메일</label>
          <input class="field-input" type="email" id="resetEmail"
            placeholder="가입한 이메일 입력" />
          <span class="field-hint" id="resetEmailErr" style="display:none"></span>
        </div>

        <button class="btn-submit" onclick="doSendReset()">재설정 링크 보내기</button>
      </div>
    </div>

    <!-- 토스트 -->
    <div class="toast" id="toast"></div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="scripts/firebase-config.js"></script>
  <script src="scripts/auth.js"></script>

  <script>
    /* ── 초기화 ── */
    const params   = new URLSearchParams(location.search);
    const redirect = params.get('redirect') || 'result';
    const benefitId = params.get('benefit_id') || '';

    MateAuth.init();

    // 이미 로그인 상태이면 바로 리다이렉트
    MateAuth.onAuthStateChanged(user => {
      if (user) gotoRedirect();
    });

    // ?tab=register 파라미터 처리
    if (params.get('tab') === 'register') switchTab('register');

    function gotoRedirect() {
      let url = redirect + '.html';
      if (benefitId) url += '?id=' + benefitId;
      location.href = url;
    }

    /* ── 탭 전환 ── */
    function switchTab(tab) {
      const isLogin = (tab === 'login');
      document.getElementById('loginSection').classList.toggle('hidden', !isLogin);
      document.getElementById('registerSection').classList.toggle('hidden', isLogin);
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    }

    /* ── 뒤로가기 ── */
    function goBack() {
      if (document.referrer) history.back();
      else location.href = 'result.html';
    }

    /* ── 로그인 ── */
    async function doLogin() {
      clearErr('loginErr');
      const email = document.getElementById('loginEmail').value.trim();
      const pw    = document.getElementById('loginPw').value;

      if (!email) return showErr('loginErr', '이메일을 입력해주세요');
      if (!pw)    return showErr('loginErr', '비밀번호를 입력해주세요');

      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = '로그인 중...';

      try {
        await MateAuth.signIn(email, pw);
        // onAuthStateChanged 가 gotoRedirect 호출
      } catch(e) {
        showErr('loginErr', getFirebaseMsg(e.code));
        btn.disabled = false; btn.textContent = '로그인';
      }
    }

    /* ── 회원가입 ── */
    async function doRegister() {
      clearAllErr();
      const name    = document.getElementById('regName').value.trim();
      const email   = document.getElementById('regEmail').value.trim();
      const pw      = document.getElementById('regPw').value;
      const pwc     = document.getElementById('regPwConfirm').value;
      const phone   = document.getElementById('regPhone').value.trim();

      let ok = true;
      if (!name)                { showErr('regNameErr','이름을 입력해주세요'); ok=false; }
      if (!isValidEmail(email)) { showErr('regEmailErr','올바른 이메일을 입력해주세요'); ok=false; }
      if (!isStrongPw(pw))      { showErr('regPwErr','8자 이상, 영문+숫자+특수문자 포함'); ok=false; }
      if (pw !== pwc)            { showErr('regPwConfirmErr','비밀번호가 일치하지 않아요'); ok=false; }
      if (phone && !isValidPhone(phone)) { showErr('regPhoneErr','010-0000-0000 형식으로 입력해주세요'); ok=false; }

      const termsOk   = document.getElementById('agreeTerms').classList.contains('checked');
      const privacyOk = document.getElementById('agreePrivacy').classList.contains('checked');
      if (!termsOk || !privacyOk) { showErr('agreeErr','필수 약관에 동의해주세요'); ok=false; }

      if (!ok) return;

      const btn = document.getElementById('registerBtn');
      btn.disabled = true; btn.textContent = '가입 중...';

      try {
        const onboarding = JSON.parse(localStorage.getItem('mateAnswers') || '{}');
        await MateAuth.signUp(name, email, pw, phone, onboarding);
        // onAuthStateChanged → gotoRedirect
      } catch(e) {
        showErr('regEmailErr', getFirebaseMsg(e.code));
        btn.disabled = false; btn.textContent = '가입하기';
      }
    }

    /* ── 비밀번호 재설정 ── */
    function openResetModal() {
      document.getElementById('resetEmail').value =
        document.getElementById('loginEmail').value || '';
      document.getElementById('resetModal').classList.remove('hidden');
    }
    function closeResetModal(e) {
      if (e.target.id === 'resetModal')
        document.getElementById('resetModal').classList.add('hidden');
    }
    async function doSendReset() {
      const email = document.getElementById('resetEmail').value.trim();
      if (!isValidEmail(email)) return showErr('resetEmailErr','올바른 이메일을 입력해주세요');
      try {
        await MateAuth.sendPasswordReset(email);
        document.getElementById('resetModal').classList.add('hidden');
        showToast('재설정 링크를 이메일로 보냈어요 📧');
      } catch(e) {
        showErr('resetEmailErr', getFirebaseMsg(e.code));
      }
    }

    /* ── 약관 체크박스 ── */
    function toggleAgree(id) {
      const el = document.getElementById(id);
      if (id === 'agreeAll') {
        const next = !el.classList.contains('checked');
        ['agreeAll','agreeTerms','agreePrivacy','agreeMarketing'].forEach(i =>
          document.getElementById(i).classList.toggle('checked', next)
        );
      } else {
        el.classList.toggle('checked');
        const allChecked =
          document.getElementById('agreeTerms').classList.contains('checked') &&
          document.getElementById('agreePrivacy').classList.contains('checked') &&
          document.getElementById('agreeMarketing').classList.contains('checked');
        document.getElementById('agreeAll').classList.toggle('checked', allChecked);
      }
    }

    /* ── 전화번호 포맷 ── */
    function formatPhone(el) {
      let v = el.value.replace(/\D/g,'');
      if (v.length > 11) v = v.slice(0,11);
      if (v.length > 7) v = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
      else if (v.length > 3) v = v.slice(0,3)+'-'+v.slice(3);
      el.value = v;
    }

    /* ── 비밀번호 강도 ── */
    function checkPwStrength() {
      const pw = document.getElementById('regPw').value;
      const score = getPwScore(pw);
      const bars  = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
      const label = document.getElementById('pwStrengthLabel');
      bars.forEach((b,i) => { b.className = 'pw-bar'; });

      if (!pw) { label.style.display = 'none'; return; }
      label.style.display = 'block';

      if (score <= 1) {
        bars[0].classList.add('fill-weak');
        label.textContent = '취약'; label.style.color = '#EF4444';
      } else if (score === 2) {
        bars[0].classList.add('fill-medium'); bars[1].classList.add('fill-medium');
        label.textContent = '보통'; label.style.color = '#F59E0B';
      } else {
        bars.forEach(b => b.classList.add('fill-strong'));
        label.textContent = '강함'; label.style.color = 'var(--color-primary)';
      }
    }
    function getPwScore(pw) {
      let s = 0;
      if (pw.length >= 8) s++;
      if (/[0-9]/.test(pw) && /[a-zA-Z]/.test(pw)) s++;
      if (/[^a-zA-Z0-9]/.test(pw)) s++;
      return s;
    }

    /* ── 소셜 미리보기 ── */
    function showSocialComingSoon() {
      showToast('카카오·네이버 로그인은 곧 오픈될 예정이에요 🙌');
    }

    /* ── 유효성 검사 ── */
    function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
    function isStrongPw(pw)  { return pw.length >= 8 && /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw) && /[^a-zA-Z0-9]/.test(pw); }
    function isValidPhone(p) { return /^010-\d{4}-\d{4}$/.test(p); }

    /* ── 에러 표시 ── */
    function showErr(id, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg; el.style.display = 'block'; el.className = 'field-hint error-msg';
    }
    function clearErr(id) {
      const el = document.getElementById(id);
      if (el) { el.style.display = 'none'; el.textContent = ''; }
    }
    function clearAllErr() {
      ['regNameErr','regEmailErr','regPwErr','regPwConfirmErr','regPhoneErr','agreeErr']
        .forEach(clearErr);
    }

    /* ── 토스트 ── */
    function showToast(msg, duration=2800) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }

    /* ── Firebase 에러 한글화 ── */
    function getFirebaseMsg(code) {
      const map = {
        'auth/user-not-found':        '등록되지 않은 이메일이에요',
        'auth/wrong-password':         '비밀번호가 틀렸어요',
        'auth/invalid-email':          '이메일 형식이 올바르지 않아요',
        'auth/email-already-in-use':   '이미 사용 중인 이메일이에요',
        'auth/weak-password':          '비밀번호가 너무 단순해요',
        'auth/too-many-requests':      '너무 많이 시도했어요. 잠시 후 다시 시도해주세요',
        'auth/network-request-failed': '네트워크 연결을 확인해주세요',
        'auth/invalid-credential':     '이메일 또는 비밀번호를 확인해주세요',
      };
      return map[code] || '오류가 발생했어요. 다시 시도해주세요';
    }
  </script>
</body>
</html>
