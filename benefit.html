<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>메이트 — 혜택 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #F7F8FA;
      --surface:  #FFFFFF;
      --surface2: #F2F5F9;
      --green:    #00C47A;
      --green-d:  #00A868;
      --green-l:  #E6F7F1;
      --amber:    #F59E0B;
      --amber-l:  #FEF3C7;
      --navy:     #1A2332;
      --text2:    #4A5568;
      --text3:    #8896A6;
      --border:   #DDE4EE;
      --radius:   16px;
      --font:     'Noto Sans KR', sans-serif;
      --shadow:   0 2px 16px rgba(0,0,0,0.07);
      --shadow-btn: 0 6px 20px rgba(0,196,122,0.30);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; background: var(--bg);
      font-family: var(--font); color: var(--navy);
      overflow-x: hidden; -webkit-font-smoothing: antialiased;
    }
    .app {
      width: 100%; max-width: 430px; min-height: 100dvh;
      margin: 0 auto; display: flex; flex-direction: column;
      background: var(--bg);
    }

    /* ── 상단 바 ── */
    .top-bar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(247,248,250,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; gap: 12px;
      padding: 52px 20px 16px;
    }
    .back-btn {
      width: 40px; height: 40px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; flex-shrink: 0;
      transition: all 0.15s; color: var(--navy);
    }
    .back-btn:active { background: var(--surface2); transform: scale(0.96); }
    .top-logo { font-size: 16px; font-weight: 900; letter-spacing: -0.5px; }

    /* ── 히어로 배너 ── */
    .hero-banner {
      margin: 4px 20px 20px;
      border-radius: 20px;
      padding: 24px 20px 20px;
      position: relative; overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .hero-color-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      border-radius: 4px 4px 0 0;
    }
    .hero-category {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 700;
      margin-bottom: 12px;
    }
    .hero-name {
      font-size: 24px; font-weight: 900;
      letter-spacing: -0.8px; line-height: 1.25;
      margin-bottom: 6px;
    }
    .hero-source { font-size: 12px; color: var(--text3); font-weight: 600; }

    /* ── 공통 섹션 ── */
    .section {
      margin: 0 20px 14px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .sec-title {
      font-size: 11px; font-weight: 800; color: var(--text3);
      letter-spacing: 0.5px; text-transform: uppercase;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .sec-title::before {
      content: ''; display: block; width: 3px; height: 12px;
      background: var(--green); border-radius: 2px;
    }
    .desc-text {
      font-size: 14px; color: var(--text2);
      line-height: 1.75; word-break: keep-all;
    }

    /* ── Before / After ── */
    .before-after {
      display: flex; gap: 8px; align-items: stretch;
    }
    .ba-box {
      flex: 1; padding: 14px 12px; border-radius: 12px;
    }
    .ba-box.before { background: #FEF2F2; }
    .ba-box.after  { background: var(--green-l); }
    .ba-label { font-size: 11px; font-weight: 700; margin-bottom: 6px; }
    .ba-box.before .ba-label { color: #DC2626; }
    .ba-box.after  .ba-label { color: var(--green-d); }
    .ba-value { font-size: 18px; font-weight: 900; margin-bottom: 4px; line-height: 1.2; }
    .ba-box.before .ba-value { color: var(--navy); }
    .ba-box.after  .ba-value { color: var(--green-d); }
    .ba-sub { font-size: 10px; color: var(--text3); line-height: 1.4; }
    .ba-arrow {
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--green); flex-shrink: 0;
    }

    /* ── 조건 체크 ── */
    .cond-list { display: flex; flex-direction: column; gap: 8px; }
    .cond-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      background: var(--surface2);
      font-size: 13px; color: var(--text2);
    }
    .cond-icon { font-size: 15px; flex-shrink: 0; }
    .cond-meet { color: var(--green-d); font-weight: 700; }
    .cond-fail { color: #DC2626; font-weight: 700; }

    /* ── 신청 단계 ── */
    .step-list { display: flex; flex-direction: column; gap: 12px; }
    .step-item { display: flex; gap: 12px; align-items: flex-start; }
    .step-num {
      width: 28px; height: 28px; flex-shrink: 0;
      background: var(--green-l); color: var(--green-d);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; margin-top: 1px;
    }
    .step-body {}
    .step-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .step-desc { font-size: 12px; color: var(--text3); line-height: 1.6; word-break: keep-all; }

    /* ── 면책 고지 ── */
    .disclaimer {
      margin: 0 20px 16px;
      padding: 14px 16px;
      background: var(--amber-l);
      border-radius: 12px;
      border-left: 3px solid var(--amber);
      font-size: 12px; color: var(--text2);
      line-height: 1.7; word-break: keep-all;
    }
    .disclaimer strong { color: var(--navy); }

    /* ── 신청 버튼 ── */
    .apply-wrap { padding: 0 20px 48px; }
    .apply-btn {
      width: 100%; padding: 18px;
      background: var(--green); color: white;
      border: none; border-radius: var(--radius);
      font-family: var(--font); font-size: 16px; font-weight: 900;
      cursor: pointer; letter-spacing: -0.3px;
      box-shadow: var(--shadow-btn);
      transition: all 0.15s; line-height: 1;
    }
    .apply-btn:active { transform: scale(0.98); box-shadow: none; }
    .apply-note {
      text-align: center; font-size: 11px; color: var(--text3);
      margin-top: 10px;
    }

    /* ── 오류 화면 ── */
    .error-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px; text-align: center;
    }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .error-sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; line-height: 1.6; }
    .error-btn {
      padding: 12px 24px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; font-family: var(--font); font-size: 14px;
      font-weight: 700; cursor: pointer; color: var(--navy);
    }

    /* ── 신청 기간 배지 ── */
    .apply-period {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 8px;
      background: #FEF3C7; color: #B45309;
      font-size: 11px; font-weight: 700;
      margin-top: 12px;
    }

    /* ── 필요 서류 체크리스트 ── */
    .doc-list { display: flex; flex-direction: column; gap: 10px; }
    .doc-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 14px; border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .doc-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .doc-body { flex: 1; min-width: 0; }
    .doc-name {
      font-size: 13px; font-weight: 700; color: var(--navy);
      margin-bottom: 3px; line-height: 1.4;
    }
    .doc-validity {
      display: inline-block; font-size: 10px; font-weight: 700;
      color: #DC2626; background: #FEF2F2;
      padding: 1px 6px; border-radius: 4px; margin-bottom: 5px;
    }
    .doc-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--green-d); font-weight: 700;
      text-decoration: none;
      padding: 3px 8px; border-radius: 6px;
      background: var(--green-l);
      transition: opacity 0.15s;
    }
    .doc-link:active { opacity: 0.7; }
    .doc-link-plain {
      font-size: 11px; color: var(--text3); font-weight: 500;
    }
    .doc-tip {
      margin-top: 12px; padding: 10px 12px;
      background: var(--green-l); border-radius: 10px;
      font-size: 12px; color: var(--green-d); line-height: 1.6;
    }

    /* ── 등장 애니메이션 ── */
    .fade-up {
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .fade-up.show { opacity: 1; transform: translateY(0); }
  </style>
</head>

function condStatus(cond, profile, age, monthly) {
  if (cond.field === 'age')
    return (age >= cond.min && age <= cond.max) ? 'meet' : 'fail';
  if (cond.field === 'income_monthly') {
    if (!monthly) return 'info';
    return monthly <= cond.value ? 'meet' : 'fail';
  }
  if (cond.field === 'job')
    return cond.values && cond.values.includes(profile.job) ? 'meet' : 'info';
  if (cond.field === 'housing')
    return cond.values && cond.values.includes(profile.housing) ? 'meet' : 'info';
  return 'info';
}

function icon(status) {
  return status === 'meet' ? '✅' : status === 'fail' ? '❌' : '🔸';
}
function cls(status) {
  return status === 'meet' ? 'cond-meet' : status === 'fail' ? 'cond-fail' : '';
}

async function loadBenefits() {
  try {
    const r = await fetch('data/benefits.json');
    if (!r.ok) throw 0;
    const d = await r.json();
    return d.benefits || FALLBACK;
  } catch { return FALLBACK; }
}

async function init() {
  const id = new URLSearchParams(location.search).get('id');
  const benefits = await loadBenefits();
  const b = id ? benefits.find(x => x.id === id) : null;
  const el = document.getElementById('content');

  if (!b) {
    el.innerHTML = `
      <div class="error-wrap">
        <div class="error-icon">🔍</div>
        <div class="error-title">혜택 정보를 찾을 수 없어요</div>
        <div class="error-sub">결과 화면으로 돌아가서<br>다시 카드를 선택해 주세요.</div>
        <button class="error-btn" onclick="goBack()">← 결과로 돌아가기</button>
      </div>`;
    return;
  }

  const raw     = localStorage.getItem('mateAnswers');
  const profile = raw ? JSON.parse(raw) : {};
  const age     = profile.birthYear ? new Date().getFullYear() - profile.birthYear : null;
  const monthly = INCOME_MAP[profile.income] || 0;
  document.title = `메이트 — ${b.name}`;

  const checks = (b.condition_checks || []).map(c => ({
    text: c.text,
    st: age !== null ? condStatus(c, profile, age, monthly) : 'info'
  }));

  const steps = [
    { n:1, title:'신청 자격 확인',
      desc:'아래 조건 항목을 내 상황과 비교해 보세요. 🔸 항목은 기관에 직접 문의하면 빠릅니다.',
      url: '' },
    { n:2, title:'필요 서류 미리 준비',
      desc:'아래 서류 목록을 보고 발급처 링크에서 미리 준비하세요. 유효기간에 주의하세요!',
      url: '' },
    { n:3, title:`${b.source} 공식 사이트에서 신청`,
      desc:'아래 신청 버튼으로 공식 홈페이지에 접속해 신청서를 작성하고 서류를 첨부하세요.',
      url: b.apply_url },
  ];

  /* 서류 체크리스트 HTML */
  function renderDocs(docs) {
    if (!docs || !docs.length) return '';
    const items = docs.map(d => {
      const validBadge = d.validity
        ? `<span class="doc-validity">⏰ ${d.validity}</span><br>`
        : '';
      const link = d.issue_url
        ? `<a class="doc-link" href="${d.issue_url}" target="_blank" rel="noopener">🔗 ${d.issue_site}에서 발급</a>`
        : `<span class="doc-link-plain">${d.issue_site}</span>`;
      return `
        <div class="doc-item">
          <div class="doc-icon">📄</div>
          <div class="doc-body">
            <div class="doc-name">${d.name}</div>
            ${validBadge}${link}
          </div>
        </div>`;
    }).join('');
    return `
      <div class="section fade-up">
        <div class="sec-title">필요 서류 체크리스트</div>
        <div class="doc-list">${items}</div>
        <div class="doc-tip">💡 서류 유효기간 초과 시 반려될 수 있어요. 신청 당일 또는 직전에 발급하는 것이 안전합니다.</div>
      </div>`;};

  el.innerHTML = `
    <div class="hero-banner fade-up">
      <div class="hero-color-bar" style="background:${b.color}"></div>
      <div class="hero-category" style="background:${b.cat_bg};color:${b.cat_color}">
        ${b.category_icon} ${b.category_label}
      </div>
      <div class="hero-name">${b.name}</div>
      <div class="hero-source">${b.source} 제공</div>
      ${b.apply_period ? `<div class="apply-period">📅 신청 기간: ${b.apply_period}</div>` : ''}
    </div>

    <div class="section fade-up">
      <div class="sec-title">혜택 소개</div>
      <p class="desc-text">${b.description}</p>
    </div>

    <div class="section fade-up">
      <div class="sec-title">Before / After</div>
      <div class="before-after">
        <div class="ba-box before">
          <div class="ba-label">${b.before_label}</div>
          <div class="ba-value">${b.before_value}</div>
          <div class="ba-sub">${b.before_sub}</div>
        </div>
        <div class="ba-arrow">→</div>
        <div class="ba-box after">
          <div class="ba-label">${b.after_label}</div>
          <div class="ba-value">${b.after_value}</div>
          <div class="ba-sub">${b.after_sub}</div>
        </div>
      </div>
    </div>

    <div class="section fade-up">
      <div class="sec-title">지원 조건</div>
      <div class="cond-list">
        ${checks.map(c => `
          <div class="cond-item">
            <span class="cond-icon">${icon(c.st)}</span>
            <span class="${cls(c.st)}">${c.text}</span>
          </div>`).join('')}
      </div>
    </div>

    ${renderDocs(b.required_docs)}

    <div class="section fade-up">
      <div class="sec-title">신청 방법</div>
      <div class="step-list">
        ${steps.map(s => `
          <div class="step-item">
            <div class="step-num">${s.n}</div>
            <div class="step-body">
              <div class="step-title">${s.title}</div>
              <div class="step-desc">${s.desc}</div>
              ${s.url ? `<a class="doc-link" style="margin-top:6px;display:inline-flex;" href="${s.url}" target="_blank" rel="noopener">🔗 공식 사이트 바로가기</a>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="disclaimer fade-up">
      <strong>⚠️ 참고용 정보입니다.</strong><br>
      이 화면의 내용은 참고용이며, 실제 지원 조건·금액·기간은 변경될 수 있습니다.
      정확한 정보는 <strong>${b.source} 공식 사이트</strong>에서 반드시 확인하세요.
    </div>

    <div class="apply-wrap fade-up">
      <button class="apply-btn" onclick="window.open('${b.apply_url}','_blank')">
        ${b.source}에서 신청하기 →
      </button>
      <p class="apply-note">버튼을 누르면 외부 공식 사이트로 이동합니다</p>
    </div>
  `;

  setTimeout(() => {
    document.querySelectorAll('.fade-up').forEach((el, i) => {
      setTimeout(() => el.classList.add('show'), 40 + i * 70);
    });
  }, 50);
}

function goBack() {
  if (history.length > 1) history.back();
  else location.href = 'result.html';
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
