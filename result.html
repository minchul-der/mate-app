<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>메이트 — 내 맞춤 혜택</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #F7F8FA;
      --surface:  #FFFFFF;
      --surface2: #F2F5F9;
      --green:    #00C47A;
      --green-d:  #00A868;
      --green-l:  #E6F7F1;
      --amber:    #F59E0B;
      --amber-l:  #FEF3C7;
      --blue:     #3B82F6;
      --blue-l:   #EFF6FF;
      --coral:    #F97316;
      --coral-l:  #FFF0E6;
      --navy:     #1A2332;
      --text2:    #4A5568;
      --text3:    #8896A6;
      --border:   #DDE4EE;
      --radius:   16px;
      --font:     'Noto Sans KR', sans-serif;
      --shadow:   0 2px 16px rgba(0,0,0,0.07);
      --shadow-btn: 0 6px 20px rgba(0,196,122,0.30);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg); font-family: var(--font);
      color: var(--navy); overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 100%; max-width: 430px;
      min-height: 100dvh; margin: 0 auto;
      display: flex; flex-direction: column;
      background: var(--bg);
    }

    /* ── 히어로 헤더 ── */
    .hero {
      background: var(--green);
      padding: 52px 20px 28px;
      position: relative; overflow: hidden;
      flex-shrink: 0;
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -30px; left: 0; right: 0;
      height: 60px; background: var(--bg);
      border-radius: 30px 30px 0 0;
    }
    .hero-logo {
      display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
    }
    .hero-logo-icon {
      width: 32px; height: 32px; background: rgba(255,255,255,0.25);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900; color: #fff; letter-spacing: -1px;
    }
    .hero-logo-text { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }

    .hero-title { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -0.8px; line-height: 1.3; margin-bottom: 14px; }

    /* 사용자 상황 요약 태그 */
    .profile-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .profile-chip {
      padding: 5px 12px;
      background: rgba(255,255,255,0.20);
      border-radius: 100px;
      font-size: 12px; font-weight: 600; color: #fff;
    }

    /* ── 혜택 카드 영역 ── */
    .cards-section {
      flex: 1; padding: 44px 20px 20px;
    }

    .section-title {
      font-size: 13px; font-weight: 800; color: var(--text3);
      letter-spacing: 0.4px; text-transform: uppercase;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title::before {
      content: ''; display: block; width: 3px; height: 12px;
      background: var(--green); border-radius: 2px;
    }

    /* ── 혜택 카드 ── */
    .benefit-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      position: relative; overflow: hidden;
      border: 1px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .benefit-card:active { transform: scale(0.99); box-shadow: 0 1px 8px rgba(0,0,0,0.07); }

    /* 카드 상단 컬러 라인 */
    .benefit-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--card-color, var(--green));
      border-radius: 3px 3px 0 0;
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .card-category {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px; font-weight: 700;
      background: var(--cat-bg, var(--green-l));
      color: var(--cat-color, var(--green-d));
    }
    .card-match {
      font-size: 11px; font-weight: 700;
      color: var(--green); padding: 4px 10px;
      background: var(--green-l); border-radius: 100px;
    }
    .card-match.partial { color: var(--amber); background: var(--amber-l); }

    .card-name { font-size: 17px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 6px; line-height: 1.3; }

    .card-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 14px; word-break: keep-all; }

    /* Before/After 비교 */
    .before-after {
      display: flex; gap: 6px; align-items: stretch; margin-bottom: 14px;
    }
    .ba-box {
      flex: 1; padding: 10px 12px;
      border-radius: 12px;
      font-size: 11px;
    }
    .ba-box.before { background: #FEF2F2; }
    .ba-box.after  { background: var(--green-l); }
    .ba-label { font-weight: 700; margin-bottom: 4px; }
    .ba-box.before .ba-label { color: #DC2626; }
    .ba-box.after  .ba-label { color: var(--green-d); }
    .ba-value { font-size: 15px; font-weight: 900; }
    .ba-box.before .ba-value { color: var(--navy); }
    .ba-box.after  .ba-value { color: var(--green-d); }
    .ba-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

    .ba-arrow {
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--green); flex-shrink: 0;
    }

    /* 조건 체크 */
    .cond-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .cond-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text2);
    }
    .cond-icon { font-size: 13px; flex-shrink: 0; }

    /* 카드 CTA */
    .card-cta {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .card-cta-label { font-size: 12px; color: var(--text3); }
    .card-btn {
      padding: 8px 16px;
      background: var(--green); color: white;
      border: none; border-radius: 10px;
      font-family: var(--font); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
    }
    .card-btn:active { transform: scale(0.97); }
    .card-btn.secondary {
      background: var(--surface2); color: var(--text2);
      border: 1px solid var(--border);
    }

    /* ── 다음 액션 섹션 ── */
    .action-section { padding: 0 20px 20px; }

    .action-row { display: flex; gap: 10px; }
    .action-btn {
      flex: 1; padding: 16px 12px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .action-btn:active { border-color: var(--green); background: var(--green-l); }
    .action-icon { font-size: 24px; }
    .action-label { font-size: 12px; font-weight: 700; color: var(--navy); }
    .action-sub { font-size: 10px; color: var(--text3); word-break: keep-all; }

    /* ── 하단 여백 ── */
    .bottom-pad { height: 40px; }

    /* ── 로딩 화면 ── */
    .loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; transition: opacity 0.5s;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .loading-sub { font-size: 13px; color: var(--text3); }

    /* ── 카드 등장 애니메이션 ── */
    .benefit-card { opacity: 0; transform: translateY(20px); }
    .benefit-card.visible {
      opacity: 1; transform: translateY(0);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
  </style>
</head>
<body>

<!-- 로딩 화면 -->

/* ══════════════════════════════════
   JSON 데이터 로드 (fetch → fallback)
   ══════════════════════════════════ */
async function loadBenefits() {
  try {
    const res = await fetch('data/benefits.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    return data.benefits || FALLBACK_BENEFITS;
  } catch {
    return FALLBACK_BENEFITS;
  }
}

/* ══════════════════════════════════
   조건 체크 아이콘 계산
   ══════════════════════════════════ */
function checkCondition(cond, profile, age, monthly) {
  if (cond.field === 'age')
    return (age >= cond.min && age <= cond.max) ? '✅' : '❌';
  if (cond.field === 'income_monthly') {
    if (!monthly) return '🔸';
    return monthly <= cond.value ? '✅' : '❌';
  }
  if (cond.field === 'job')
    return cond.values.includes(profile.job) ? '✅' : '🔸';
  if (cond.field === 'region')
    return cond.values.includes(profile.sido) ? '✅' : '🔸';
  if (cond.field === 'housing')
    return cond.values.includes(profile.housing) ? '✅' : '🔸';
  return '🔸'; // field:'info' 등 정보성 조건
}

/* ══════════════════════════════════
   혜택 점수 계산
   ══════════════════════════════════ */
function scoreBenefit(b, profile, age, monthly) {
  const f = b.filter;
  if (age < f.age_min || age > f.age_max) return -1; // 나이 필수 조건

  let score = 100 + (b.priority_boost || 0);
  if (!f.goals.length        || f.goals.includes(profile.goal))          score += 30;
  if (!f.jobs.length         || f.jobs.includes(profile.job))            score += 20;
  if (!f.regions.length      || f.regions.includes(profile.sido))        score += 15;
  if (!f.housing_types.length|| f.housing_types.includes(profile.housing)) score += 10;
  if (!f.income_max_monthly  || !monthly || monthly <= f.income_max_monthly) score += 10;
  return score;
}

/* ══════════════════════════════════
   상위 3장 선택 (카테고리 다양성 보장)
   ══════════════════════════════════ */
function selectTop3(benefits, profile) {
  const age     = new Date().getFullYear() - profile.birthYear;
  const monthly = INCOME_MAP[profile.income] || 0;

  const scored = benefits
    .map(b => ({ ...b, _score: scoreBenefit(b, profile, age, monthly) }))
    .filter(b => b._score > 0)
    .sort((a, b) => b._score - a._score);

  const result = [], catCount = {};
  for (const b of scored) {
    if (result.length >= 3) break;
    catCount[b.category] = (catCount[b.category] || 0) + 1;
    if (catCount[b.category] <= 2) result.push(b);
  }
  return result;
}

/* ══════════════════════════════════
   카드 HTML 생성
   ══════════════════════════════════ */
function renderCard(card, profile, delay) {
  const age     = new Date().getFullYear() - profile.birthYear;
  const monthly = INCOME_MAP[profile.income] || 0;
  const checks  = (card.condition_checks || []).map(c => ({
    icon: checkCondition(c, profile, age, monthly),
    text: c.text
  }));

  const anyFail  = checks.some(c => c.icon === '❌');
  const allGreen = checks.length > 0 && checks.every(c => c.icon === '✅');
  const matchCls = anyFail ? 'partial' : '';
  const matchTxt = allGreen ? '✅ 바로 신청 가능' : anyFail ? '🔸 조건 확인 필요' : '✅ 신청 가능';

  const el = document.createElement('div');
  el.className = 'benefit-card';
  el.style.setProperty('--card-color', card.color);
  el.innerHTML = `
    <div class="card-top">
      <div class="card-category" style="background:${card.cat_bg};color:${card.cat_color};">
        ${card.category_icon} ${card.category_label}
      </div>
      <div class="card-match ${matchCls}">${matchTxt}</div>
    </div>
    <div class="card-name">${card.name}</div>
    <div class="card-desc">${card.description}</div>
    <div class="before-after">
      <div class="ba-box before">
        <div class="ba-label">${card.before_label}</div>
        <div class="ba-value">${card.before_value}</div>
        <div class="ba-sub">${card.before_sub}</div>
      </div>
      <div class="ba-arrow">→</div>
      <div class="ba-box after">
        <div class="ba-label">${card.after_label}</div>
        <div class="ba-value">${card.after_value}</div>
        <div class="ba-sub">${card.after_sub}</div>
      </div>
    </div>
    <div class="cond-list">
      ${checks.map(c => `
        <div class="cond-item">
          <span class="cond-icon">${c.icon}</span>
          <span>${c.text}</span>
        </div>`).join('')}
    </div>
    <div class="card-cta">
      <span class="card-cta-label">신청 전 조건을 꼭 확인하세요</span>
      <button class="card-btn" onclick="goTo('benefit.html?id=${card.id}')">자세히 →</button>
    </div>
  `;
  setTimeout(() => el.classList.add('visible'), delay);
  return el;
}

/* ══════════════════════════════════
   초기화
   ══════════════════════════════════ */
async function init() {
  const raw     = localStorage.getItem('mateAnswers');
  const profile = raw ? JSON.parse(raw) : null;
  if (!profile) { window.location.href = 'onboarding.html'; return; }

  const benefits = await loadBenefits();

  /* 프로필 태그 */
  const age  = new Date().getFullYear() - profile.birthYear;
  const tags = [`만 ${age}세`];
  if (profile.job)     tags.push(profile.job);
  if (profile.sido)    tags.push(profile.sido + (profile.sigungu ? ' ' + profile.sigungu : ''));
  if (profile.income)  tags.push(profile.income);
  if (profile.housing) tags.push(profile.housing);
  document.getElementById('profileChips').innerHTML =
    tags.map(t => `<div class="profile-chip">${t}</div>`).join('');

  /* 카드 렌더링 */
  const cards     = selectTop3(benefits, profile);
  const container = document.getElementById('benefitCards');

  if (!cards.length) {
    container.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:14px;">
      조건에 맞는 혜택을 찾지 못했어요.<br>온보딩을 다시 해보세요.
      <br><br><button class="card-btn" onclick="goTo('onboarding.html')">다시 시작</button>
    </div>`;
  } else {
    cards.forEach((card, i) => container.appendChild(renderCard(card, profile, 200 + i * 150)));
  }

  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('appMain').style.display = 'flex';
  }, 1200);
}

function goTo(path) {
  document.querySelector('.app').style.cssText = 'opacity:0;transition:opacity 0.3s';
  setTimeout(() => { window.location.href = path; }, 300);
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
