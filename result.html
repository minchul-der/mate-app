<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>메이트 — 내 맞춤 혜택</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root {
      --bg:       #F7F9F8;
      --surface:  #FFFFFF;
      --surface2: #F7F9F8;
      --green:    #1B4F3A;
      --green-d:  #2D7A5F;
      --green-l:  #E1F5EE;
      --amber:    #F6AD55;
      --amber-l:  #FFF8EC;
      --blue:     #3B82F6;
      --blue-l:   #EFF6FF;
      --coral:    #FF6B35;
      --coral-l:  #FFF0E6;
      --navy:     #1A1A2E;
      --text2:    #4A5568;
      --text3:    #8896A6;
      --border:   #E4EAE7;
      --radius:   16px;
      --font:     'Pretendard', 'Noto Sans KR', sans-serif;
      --shadow:   0 2px 12px rgba(0,0,0,0.06);
      --shadow-btn: 0 4px 16px rgba(27,79,58,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      background: var(--bg); font-family: var(--font);
      color: var(--navy); overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 100%; max-width: 430px;
      min-height: 100dvh; margin: 0 auto;
      display: flex; flex-direction: column;
      background: var(--bg);
    }

    /* ── 히어로 헤더 ── */
    .hero {
      background: var(--green);
      padding: 52px 20px 18px;
      position: relative; overflow: hidden;
      flex-shrink: 0;
    }
    .hero::before {
      content: '';
      position: absolute; top: -60px; right: -50px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -12px; left: 0; right: 0;
      height: 24px; background: var(--bg);
      border-radius: 24px 24px 0 0;
    }
    .hero-logo {
      display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
    }
    .hero-logo-icon {
      width: 30px; height: 30px; background: rgba(255,255,255,0.20);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.5px;
    }
    .hero-logo-text { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }

    .hero-title { font-size: 21px; font-weight: 700; color: #fff; letter-spacing: -0.6px; line-height: 1.35; margin-bottom: 14px; }

    /* 사용자 상황 요약 태그 */
    .profile-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .profile-chip {
      padding: 5px 12px;
      background: rgba(255,255,255,0.20);
      border-radius: 100px;
      font-size: 12px; font-weight: 600; color: #fff;
    }

    /* ── 카테고리 필터 칩 ── */
    .cat-filter {
      display: flex; gap: 8px;
      padding: 7px 20px 10px;
      overflow-x: auto; overflow-y: hidden;
      cursor: grab;
      scrollbar-width: none;
      position: sticky; top: 0; z-index: 5;
      background: var(--bg);
    }
    .cat-filter::-webkit-scrollbar { display: none; }
    .cat-chip {
      flex-shrink: 0; white-space: nowrap;
      padding: 7px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--text2); cursor: pointer;
      transition: all 0.18s;
    }
    .cat-chip.active { background: var(--green); border-color: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(27,79,58,0.25); }
    .cat-chip:active { transform: scale(0.96); }

    /* 카테고리 섹션 카운트 뱃지 */
    .cat-count {
      display: inline-block;
      background: rgba(255,255,255,0.35);
      border-radius: 100px;
      padding: 1px 5px;
      font-size: 11px;
      margin-left: 3px;
    }
    .cat-chip:not(.active) .cat-count { background: var(--border); }

    /* ── 혜택 카드 영역 ── */
    .cards-section {
      flex: 1; padding: 10px 20px 20px;
    }

    .section-title {
      font-size: 13px; font-weight: 800; color: var(--text3);
      letter-spacing: 0.4px; text-transform: uppercase;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title::before {
      content: ''; display: block; width: 3px; height: 12px;
      background: var(--green); border-radius: 2px;
    }

    /* ── 혜택 카드 ── */
    .benefit-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      position: relative; overflow: hidden;
      border: 0.5px solid var(--border);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .benefit-card:active { transform: scale(0.99); box-shadow: 0 1px 8px rgba(0,0,0,0.07); }

    /* 카드 상단 컬러 라인 */
    .benefit-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--card-color, var(--green));
      border-radius: 3px 3px 0 0;
    }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .card-category {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px; font-weight: 700;
      background: var(--cat-bg, var(--green-l));
      color: var(--cat-color, var(--green-d));
    }
    .card-match {
      font-size: 11px; font-weight: 700;
      color: var(--green); padding: 4px 10px;
      background: var(--green-l); border-radius: 100px;
    }
    .card-match.partial { color: var(--amber); background: var(--amber-l); }

    .card-name { font-size: 16px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; line-height: 1.3; color: var(--navy); }

    .card-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 14px; word-break: keep-all; }

    /* Before/After 비교 */
    .before-after {
      display: flex; gap: 6px; align-items: stretch; margin-bottom: 14px;
    }
    .ba-box {
      flex: 1; padding: 10px 12px;
      border-radius: 12px;
      font-size: 11px;
    }
    .ba-box.before { background: #FEF2F2; }
    .ba-box.after  { background: var(--green-l); }
    .ba-label { font-weight: 700; margin-bottom: 4px; }
    .ba-box.before .ba-label { color: #DC2626; }
    .ba-box.after  .ba-label { color: var(--green-d); }
    .ba-value { font-size: 15px; font-weight: 900; }
    .ba-box.before .ba-value { color: var(--navy); }
    .ba-box.after  .ba-value { color: var(--green-d); }
    .ba-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

    .ba-arrow {
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--green); flex-shrink: 0;
    }

    /* 조건 체크 */
    .cond-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .cond-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text2);
    }
    .cond-icon { font-size: 13px; flex-shrink: 0; }

    /* 카드 CTA */
    .card-cta {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .card-cta-label { font-size: 12px; color: var(--text3); }
    .card-btn {
      padding: 8px 16px;
      background: var(--green); color: white;
      border: none; border-radius: 10px;
      font-family: var(--font); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
    }
    .card-btn:active { transform: scale(0.97); }
    .card-btn.secondary {
      background: var(--surface2); color: var(--text2);
      border: 1px solid var(--border);
    }

    /* ── 다음 액션 섹션 ── */
    .action-section { padding: 0 20px 20px; }

    .action-row { display: flex; gap: 10px; }
    .action-btn {
      flex: 1; padding: 16px 12px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .action-btn:active { border-color: var(--green); background: var(--green-l); }
    .action-icon { font-size: 24px; }
    .action-label { font-size: 12px; font-weight: 700; color: var(--navy); }
    .action-sub { font-size: 10px; color: var(--text3); word-break: keep-all; }

    /* ── 하단 여백 ── */
    .bottom-pad { height: 40px; }

    /* ── 로그인 상태 헤더 ── */
    .auth-header-btn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 99px;
      padding: 7px 14px 7px 10px;
      font-family: var(--font); font-size: 12px; font-weight: 600;
      color: #fff; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .auth-header-btn:active { background: rgba(255,255,255,0.28); }
    .auth-avatar {
      width: 22px; height: 22px;
      background: rgba(255,255,255,0.30); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }

    /* ── D-Day 뱃지 ── */
    .dday-badge {
      display: inline-flex; align-items: center;
      padding: 3px 8px; border-radius: 99px;
      font-size: 11px; font-weight: 700;
      margin-left: 4px;
    }

    /* ── 알림 버튼 ── */
    .alarm-btn {
      padding: 7px 12px;
      border-radius: 10px; border: 1.5px solid var(--border);
      background: none; cursor: pointer;
      font-family: var(--font); font-size: 12px; font-weight: 700;
      color: var(--text3); transition: all 0.15s;
      display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    .alarm-btn[data-alarm-on="true"] {
      border-color: var(--green); background: var(--green-l);
      color: var(--green-d);
    }
    .alarm-btn:active { transform: scale(0.97); }
    .alarm-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 알림 설정 모달 ── */
    .alarm-modal-head {
      padding: 0 20px 16px; border-bottom: 1px solid var(--border);
    }
    .alarm-modal-name {
      font-size: 17px; font-weight: 700; letter-spacing: -0.4px;
      color: var(--navy); margin-bottom: 4px;
    }
    .alarm-modal-deadline {
      font-size: 13px; color: var(--text3);
    }

    /* 알림 미리보기 */
    .alarm-preview-section {
      padding: 20px 20px 0;
    }
    .alarm-preview-label {
      font-size: 12px; font-weight: 700;
      color: var(--text3); letter-spacing: 0.3px; margin-bottom: 10px;
    }
    .notif-mockup {
      background: rgba(0,0,0,0.05);
      border-radius: 16px; padding: 14px 16px;
      border: 1px solid var(--border);
    }
    .notif-app-row {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 8px;
    }
    .notif-app-icon {
      width: 20px; height: 20px;
      background: var(--green); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
    }
    .notif-app-name { font-size: 12px; font-weight: 700; color: var(--navy); flex: 1; }
    .notif-app-time { font-size: 11px; color: var(--text3); }
    .notif-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 3px; }
    .notif-body  { font-size: 13px; color: var(--text2); line-height: 1.5; }

    /* 알림 날짜 선택 */
    .alarm-days-wrap { padding: 20px 20px 0; }
    .alarm-days-title {
      font-size: 14px; font-weight: 700; color: var(--navy);
      margin-bottom: 12px;
    }
    .alarm-days-title span { font-size: 12px; font-weight: 400; color: var(--text3); }
    .alarm-days-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .alarm-day-chip {
      border: 1.5px solid var(--border);
      border-radius: 14px; padding: 12px 8px;
      cursor: pointer; background: #fff; text-align: center;
      transition: all 0.15s;
    }
    .alarm-day-chip.selected {
      border-color: var(--green); background: var(--green-l);
    }
    .alarm-day-chip:active { transform: scale(0.97); }
    .alarm-day-label {
      font-size: 15px; font-weight: 700; color: var(--navy);
      margin-bottom: 3px;
    }
    .alarm-day-chip.selected .alarm-day-label { color: var(--green-d); }
    .alarm-day-sub { font-size: 11px; color: var(--text3); }
    .alarm-day-chip.selected .alarm-day-sub { color: var(--green-d); }

    /* 모달 버튼 영역 */
    .alarm-modal-btns {
      padding: 20px 20px 40px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .btn-alarm-confirm {
      padding: 16px; border-radius: 13px; border: none; cursor: pointer;
      font-family: var(--font); font-size: 15px; font-weight: 700;
      background: var(--green); color: #fff;
      box-shadow: var(--shadow-btn); transition: all 0.2s;
    }
    .btn-alarm-confirm:active { opacity: 0.88; }
    .btn-alarm-confirm:disabled { background: var(--border); box-shadow: none; cursor: not-allowed; }
    .btn-alarm-off {
      padding: 14px; border-radius: 14px; border: 1.5px solid #FCA5A5; cursor: pointer;
      font-family: var(--font); font-size: 14px; font-weight: 700;
      background: #FEF2F2; color: #EF4444; transition: all 0.2s;
    }
    .btn-alarm-off:active { opacity: 0.85; }
    .btn-alarm-later {
      padding: 12px; border: none; background: none; cursor: pointer;
      font-family: var(--font); font-size: 13px; color: var(--text3);
    }

    /* ── 비로그인 알림 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.hidden { display: none; }
    .modal-sheet {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 24px 20px 44px; width: 100%; max-width: 430px;
    }
    .modal-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 99px; margin: 0 auto 24px;
    }
    .modal-icon { font-size: 40px; text-align: center; margin-bottom: 12px; }
    .modal-title {
      font-size: 18px; font-weight: 700; letter-spacing: -0.4px;
      margin-bottom: 6px; text-align: center;
    }
    .modal-sub {
      font-size: 13px; color: var(--text3);
      text-align: center; margin-bottom: 28px; line-height: 1.6;
    }
    .modal-btns { display: flex; flex-direction: column; gap: 10px; }
    .btn-modal-primary {
      padding: 15px; border-radius: 13px; border: none; cursor: pointer;
      font-family: var(--font); font-size: 15px; font-weight: 700;
      background: var(--green); color: #fff;
      box-shadow: var(--shadow-btn); transition: all 0.2s;
    }
    .btn-modal-primary:active { opacity: 0.88; }
    .btn-modal-secondary {
      padding: 14px; border-radius: 14px; cursor: pointer;
      font-family: var(--font); font-size: 14px; font-weight: 700;
      background: none; border: 1.5px solid var(--border);
      color: var(--navy); transition: all 0.2s;
    }
    .btn-modal-ghost {
      padding: 10px; border: none; background: none; cursor: pointer;
      font-family: var(--font); font-size: 13px; color: var(--text3);
    }

    /* ── 로딩 화면 ── */
    .loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; transition: opacity 0.5s;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .loading-sub { font-size: 13px; color: var(--text3); }

    /* ── 카드 등장 애니메이션 ── */
    .benefit-card { opacity: 0; transform: translateY(20px); }
    .benefit-card.visible {
      opacity: 1; transform: translateY(0);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
  </style>
</head>
<body>

<!-- 로딩 화면 -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">맞춤 혜택을 찾는 중이에요</div>
  <div class="loading-sub">잠깐만 기다려 주세요 🌿</div>
</div>

<div class="app" id="appMain" style="display:none;">

  <!-- 알림 설정 모달 -->
  <div class="modal-overlay hidden" id="alarmModal" onclick="closeAlarmModal(event)">
    <div class="modal-sheet">
      <div style="padding:20px 20px 0"><div class="modal-handle"></div></div>
      <div class="alarm-modal-head">
        <div style="margin-bottom:8px" id="alarmModalDday"></div>
        <div class="alarm-modal-name" id="alarmModalName"></div>
        <div class="alarm-modal-deadline" id="alarmModalDeadline"></div>
      </div>
      <div class="alarm-preview-section">
        <div class="alarm-preview-label">📱 이런 알림이 와요</div>
        <div class="notif-mockup">
          <div class="notif-app-row">
            <div class="notif-app-icon">M</div>
            <span class="notif-app-name">mate.</span>
            <span class="notif-app-time">방금</span>
          </div>
          <div class="notif-title" id="notifPreviewTitle"></div>
          <div class="notif-body" id="notifPreviewBody">신청 기간이 얼마 남지 않았어요. 지금 바로 확인하세요 →</div>
        </div>
      </div>
      <div class="alarm-days-wrap">
        <div class="alarm-days-title">언제 알려드릴까요? <span>(복수 선택 가능)</span></div>
        <div class="alarm-days-grid" id="alarmDaysGrid"></div>
      </div>
      <div class="alarm-modal-btns">
        <button class="btn-alarm-confirm" id="alarmConfirmBtn" onclick="doSetAlarm()">알림 설정하기</button>
        <button class="btn-alarm-off" id="alarmOffBtn" style="display:none" onclick="doCancelAlarm()">🔕 알림 해제</button>
        <button class="btn-alarm-later" onclick="closeAlarmModal()">나중에</button>
      </div>
    </div>
  </div>

  <!-- 비로그인 알림 모달 -->
  <div class="modal-overlay hidden" id="loginModal" onclick="closeLoginModal(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-icon">🔔</div>
      <div class="modal-title">혜택을 놓치지 마세요!</div>
      <div class="modal-sub">로그인하면 마감 전에 알림을 받고<br>내 혜택 목록을 저장할 수 있어요.</div>
      <div class="modal-btns">
        <button class="btn-modal-primary" onclick="goToLogin('register')">3초 가입하기</button>
        <button class="btn-modal-secondary" onclick="goToLogin('login')">이미 계정이 있어요</button>
        <button class="btn-modal-ghost" onclick="closeLoginModal()">나중에</button>
      </div>
    </div>
  </div>

  <!-- 히어로 헤더 -->
  <div class="hero">
    <div class="hero-logo" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="hero-logo-icon">M</div>
        <span class="hero-logo-text">mate.</span>
      </div>
      <button class="auth-header-btn" id="authBtn" onclick="handleAuthBtnClick()">
        <span id="authBtnInner">로그인</span>
      </button>
    </div>
    <div class="hero-title" id="heroTitle">내 상황에 딱 맞는<br />혜택을 찾았어요 🎉</div>
    <div class="profile-chips" id="profileChips">
      <!-- JS로 사용자 프로필 태그 채워짐 -->
    </div>
  </div>

  <!-- 카테고리 필터 칩 -->
  <div class="cat-filter" id="catFilter">
    <button class="cat-chip active" data-cat="전체" onclick="filterBenefits('전체',this)">전체</button>
  </div>

  <!-- 혜택 카드 영역 -->
  <div class="cards-section">
    <div class="section-title" id="sectionTitle">지금 받을 수 있는 혜택</div>
    <div id="benefitCards">
      <!-- JS로 카드 생성 -->

/* ══════════════════════════════════
   JSON 데이터 로드 (fetch → fallback)
   ══════════════════════════════════ */
async function loadBenefits() {
  try {
    const res = await fetch('data/benefits.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    return data.benefits || FALLBACK_BENEFITS;
  } catch {
    return FALLBACK_BENEFITS;
  }
}

/* ══════════════════════════════════
   조건 체크 아이콘 계산
   ══════════════════════════════════ */
function checkCondition(cond, profile, age, monthly) {
  if (cond.field === 'age')
    return (age >= cond.min && age <= cond.max) ? '✅' : '❌';
  if (cond.field === 'income_monthly') {
    if (!monthly) return '🔸';
    return monthly <= cond.value ? '✅' : '❌';
  }
  if (cond.field === 'job')
    return cond.values.includes(profile.job) ? '✅' : '🔸';
  if (cond.field === 'region')
    return cond.values.includes(profile.sido) ? '✅' : '🔸';
  if (cond.field === 'housing')
    return cond.values.includes(profile.housing) ? '✅' : '🔸';
  return '🔸'; // field:'info' 등 정보성 조건
}

/* ══════════════════════════════════
   혜택 점수 계산
   ══════════════════════════════════ */
function scoreBenefit(b, profile, age, monthly) {
  const f = b.filter;
  if (age < f.age_min || age > f.age_max) return -1; // 나이 필수 조건

  let score = 100 + (b.priority_boost || 0);
  if (!f.goals.length        || f.goals.includes(profile.goal))          score += 30;
  if (!f.jobs.length         || f.jobs.includes(profile.job))            score += 20;
  if (!f.regions.length      || f.regions.includes(profile.sido))        score += 15;
  if (!f.housing_types.length|| f.housing_types.includes(profile.housing)) score += 10;
  if (!f.income_max_monthly  || !monthly || monthly <= f.income_max_monthly) score += 10;
  return score;
}

/* ══════════════════════════════════
   카테고리 메타 정의
   ══════════════════════════════════ */
const CAT_META = {
  '금융': { label: '💰 금융·저축', key: '금융' },
  '주거': { label: '🏠 주거',      key: '주거' },
  '교육': { label: '📚 교육',      key: '교육' },
  '취업': { label: '💼 취업',      key: '취업' },
  '복지': { label: '🤝 복지',      key: '복지' },
  '직업': { label: '💼 직업 맞춤', key: '직업' },
  '지역': { label: '📍 내 지역',   key: '지역' },
};

/* 혜택 하나에 해당하는 카테고리 키 목록 반환 */
function getCats(b, profile) {
  const cats = new Set([b.category]);
  const f = b.filter || {};
  if (f.jobs && f.jobs.length && profile.job && f.jobs.includes(profile.job))
    cats.add('직업');
  if (f.regions && f.regions.length && profile.sido && f.regions.includes(profile.sido))
    cats.add('지역');
  return [...cats];
}

/* ══════════════════════════════════
   자격 해당 혜택 전체 선택 (점수순)
   ══════════════════════════════════ */
function selectAll(benefits, profile) {
  const age     = new Date().getFullYear() - profile.birthYear;
  const monthly = INCOME_MAP[profile.income] || 0;
  return benefits
    .map(b => ({ ...b, _score: scoreBenefit(b, profile, age, monthly) }))
    .filter(b => b._score > 0)
    .sort((a, b) => b._score - a._score);
}

/* ══════════════════════════════════
   카테고리 필터 + 칩 빌드
   ══════════════════════════════════ */
let _allCards = [];   // 렌더된 카드 DOM 참조
let _profile  = null; // 현재 프로필

function buildChips(cards, profile) {
  const catCount = {};
  cards.forEach(b => {
    getCats(b, profile).forEach(c => {
      catCount[c] = (catCount[c] || 0) + 1;
    });
  });

  // 전체 칩 카운트 업데이트
  const allChip = document.querySelector('.cat-chip[data-cat="전체"]');
  if (allChip) allChip.innerHTML = `전체 <span class="cat-count">${cards.length}</span>`;

  const strip = document.getElementById('catFilter');
  const order = ['금융','주거','교육','취업','복지','직업','지역'];
  order.forEach(key => {
    if (!catCount[key]) return;
    const meta = CAT_META[key] || { label: key };
    const btn  = document.createElement('button');
    btn.className    = 'cat-chip';
    btn.dataset.cat  = key;
    btn.innerHTML    = `${meta.label} <span class="cat-count">${catCount[key]}</span>`;
    btn.onclick = () => filterBenefits(key, btn);
    strip.appendChild(btn);
  });
}

function filterBenefits(cat, btn) {
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');

  let shown = 0;
  _allCards.forEach(({ el, cats }) => {
    const visible = cat === '전체' || cats.includes(cat);
    el.style.display = visible ? '' : 'none';
    if (visible) shown++;
  });

  const meta = CAT_META[cat];
  document.getElementById('sectionTitle').textContent =
    cat === '전체' ? `지금 받을 수 있는 혜택` : `${meta ? meta.label : cat} (${shown}개)`;
}

/* ══════════════════════════════════
   카드 HTML 생성
   ══════════════════════════════════ */
function renderCard(card, profile, delay) {
  const age     = new Date().getFullYear() - profile.birthYear;
  const monthly = INCOME_MAP[profile.income] || 0;
  const checks  = (card.condition_checks || []).map(c => ({
    icon: checkCondition(c, profile, age, monthly),
    text: c.text
  }));

  const anyFail  = checks.some(c => c.icon === '❌');
  const allGreen = checks.length > 0 && checks.every(c => c.icon === '✅');
  const matchCls = anyFail ? 'partial' : '';
  const matchTxt = allGreen ? '✅ 바로 신청 가능' : anyFail ? '🔸 조건 확인 필요' : '✅ 신청 가능';

  const el = document.createElement('div');
  el.className = 'benefit-card';
  el.style.setProperty('--card-color', card.color);
  el.innerHTML = `
    <div class="card-top">
      <div class="card-category" style="background:${card.cat_bg};color:${card.cat_color};">
        ${card.category_icon} ${card.category_label}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${card.deadline ? `<span class="dday-badge" id="dday-${card.id}" data-deadline="${card.deadline}"></span>` : ''}
        <div class="card-match ${matchCls}">${matchTxt}</div>
      </div>
    </div>
    <div class="card-name">${card.name}</div>
    <div class="card-desc">${card.description}</div>
    <div class="before-after">
      <div class="ba-box before">
        <div class="ba-label">${card.before_label}</div>
        <div class="ba-value">${card.before_value}</div>
        <div class="ba-sub">${card.before_sub}</div>
      </div>
      <div class="ba-arrow">→</div>
      <div class="ba-box after">
        <div class="ba-label">${card.after_label}</div>
        <div class="ba-value">${card.after_value}</div>
        <div class="ba-sub">${card.after_sub}</div>
      </div>
    </div>
    <div class="cond-list">
      ${checks.map(c => `
        <div class="cond-item">
          <span class="cond-icon">${c.icon}</span>
          <span>${c.text}</span>
        </div>`).join('')}
    </div>
    <div class="card-cta">
      <button class="alarm-btn" id="alarm-${card.id}"
        data-alarm-on="false" data-id="${card.id}"
        data-name="${card.name}" data-deadline="${card.deadline||''}"
        onclick="handleAlarm(this)">🔔 알림</button>
      <button class="card-btn" onclick="goTo('benefit.html?id=${card.id}')">자세히 →</button>
    </div>
  `;
  const cats = getCats(card, _profile || profile);
  el.dataset.cats = cats.join(',');
  _allCards.push({ el, cats });
  setTimeout(() => el.classList.add('visible'), delay);
  return el;
}

/* ══════════════════════════════════
   초기화
   ══════════════════════════════════ */
async function init() {
  const raw     = localStorage.getItem('mateAnswers');
  const profile = raw ? JSON.parse(raw) : null;
  if (!profile) { window.location.href = 'onboarding.html'; return; }

  const benefits = await loadBenefits();

  /* 프로필 태그 */
  const age  = new Date().getFullYear() - profile.birthYear;
  const tags = [`만 ${age}세`];
  if (profile.job)     tags.push(profile.job);
  if (profile.sido)    tags.push(profile.sido + (profile.sigungu ? ' ' + profile.sigungu : ''));
  if (profile.income)  tags.push(profile.income);
  if (profile.housing) tags.push(profile.housing);
  document.getElementById('profileChips').innerHTML =
    tags.map(t => `<div class="profile-chip">${t}</div>`).join('');

  /* 카드 렌더링 */
  _profile  = profile;
  _allCards = [];
  const cards     = selectAll(benefits, profile);
  const container = document.getElementById('benefitCards');

  if (!cards.length) {
    container.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--text3);font-size:14px;">
      조건에 맞는 혜택을 찾지 못했어요.<br>온보딩을 다시 해보세요.
      <br><br><button class="card-btn" onclick="goTo('onboarding.html')">다시 시작</button>
    </div>`;
  } else {
    cards.forEach((card, i) => container.appendChild(renderCard(card, profile, 200 + i * 150)));
    buildChips(cards, profile);
    document.getElementById('sectionTitle').textContent =
      `지금 받을 수 있는 혜택 (${cards.length}개)`;
  }

  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('appMain').style.display = 'flex';
  }, 1200);
}

function goTo(path) {
  document.querySelector('.app').style.cssText = 'opacity:0;transition:opacity 0.3s';
  setTimeout(() => { window.location.href = path; }, 300);
}

function scrollToBenefits() {
  const chip = document.querySelector('.cat-chip[data-cat="전체"]');
  if (chip) filterBenefits('전체', chip);
  document.getElementById('catFilter').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── 카테고리 필터 마우스 드래그 스크롤 ── */
(function () {
  const el = document.getElementById('catFilter');
  // catFilter는 JS로 동적 생성되므로 DOMContentLoaded 이후 등록
  window.addEventListener('DOMContentLoaded', () => {
    const strip = document.getElementById('catFilter');
    let isDown = false, startX = 0, scrollLeft = 0, moved = false;

    strip.addEventListener('mousedown', e => {
      isDown   = true;
      moved    = false;
      startX   = e.pageX - strip.offsetLeft;
      scrollLeft = strip.scrollLeft;
      strip.style.cursor = 'grabbing';
      strip.style.userSelect = 'none';
    });

    window.addEventListener('mouseup', () => {
      isDown = false;
      strip.style.cursor = 'grab';
      strip.style.userSelect = '';
    });

    window.addEventListener('mousemove', e => {
      if (!isDown) return;
      const x    = e.pageX - strip.offsetLeft;
      const walk = (x - startX) * 1.2;
      if (Math.abs(walk) > 4) moved = true;
      strip.scrollLeft = scrollLeft - walk;
    });

    /* 드래그 중 클릭 이벤트 차단 */
    strip.addEventListener('click', e => {
      if (moved) { e.stopPropagation(); e.preventDefault(); }
    }, true);
  });
})();

window.addEventListener('DOMContentLoaded', init);

/* ══════════════════════════════════
   Firebase Auth + Alarm 초기화
   ══════════════════════════════════ */
(function initFirebase() {
  try {
    MateAuth.init();
    MateAlarm.init();
  } catch(e) {
    // Firebase 미설정 시 무시 (기능만 비활성화)
    return;
  }

  MateAuth.onAuthStateChanged(async user => {
    updateAuthBtn(user);
    if (user) {
      // D-Day 뱃지 렌더
      renderAllDday();
      // 저장된 알림 상태 반영
      try {
        const alarms = await MateAlarm.getUserAlarms(user.uid);
        const ids = new Set(alarms.map(a => a.benefit_id));
        document.querySelectorAll('.alarm-btn').forEach(btn => {
          const on = ids.has(btn.dataset.id);
          btn.dataset.alarmOn = on;
          btn.textContent = on ? '🔔 ON' : '🔔 알림';
        });
      } catch {}
    } else {
      renderAllDday();
    }
  });
})();

/* 로그인 상태 헤더 버튼 업데이트 */
function updateAuthBtn(user) {
  const inner = document.getElementById('authBtnInner');
  if (!inner) return;
  if (user) {
    const name = user.displayName || '나';
    inner.innerHTML = `<span class="auth-avatar">👤</span> 마이페이지`;
  } else {
    inner.innerHTML = `<span class="auth-avatar">🔑</span> 로그인`;
  }
}

function handleAuthBtnClick() {
  const user = MateAuth.getCurrentUser();
  if (user) {
    location.href = 'mypage.html';
  } else {
    goToLogin('login');
  }
}

/* ── 알림 모달 상태 ── */
const ALARM_DAYS_META = [
  { days: 30, label: 'D-30', sub: '한달 전' },
  { days: 14, label: 'D-14', sub: '2주 전'  },
  { days: 7,  label: 'D-7',  sub: '1주 전'  },
  { days: 3,  label: 'D-3',  sub: '3일 전'  },
  { days: 1,  label: 'D-1',  sub: '하루 전' },
];
let _alarmBtn = null;
let _selectedDays = [7, 1]; // 기본 선택

/* 알림 버튼 처리 → 모달 열기 */
async function handleAlarm(btn) {
  let user;
  try { user = MateAuth.getCurrentUser(); } catch { user = null; }
  if (!user) { document.getElementById('loginModal').classList.remove('hidden'); return; }

  _alarmBtn = btn;
  const benefitId   = btn.dataset.id;
  const benefitName = btn.dataset.name;
  const deadline    = btn.dataset.deadline || '';

  // D-Day 정보
  const dday = deadline ? MateAlarm.getDDayInfo(deadline) : null;

  // 이미 설정된 알림 데이터 조회
  let existingData = null;
  try { existingData = await MateAlarm.getAlarmData(benefitId); } catch {}

  // 모달 내용 채우기
  const ddayEl = document.getElementById('alarmModalDday');
  if (dday) {
    ddayEl.innerHTML = `<span class="dday-badge" style="background:${dday.bg};color:${dday.color}">${dday.label}</span>`;
  } else { ddayEl.innerHTML = ''; }

  document.getElementById('alarmModalName').textContent = benefitName;
  document.getElementById('alarmModalDeadline').textContent = deadline
    ? `마감일: ${deadline.replace(/-/g,'.')}` : '상시 신청';

  // 알림 미리보기 텍스트
  const dayPreview = dday ? dday.label : 'D-7';
  document.getElementById('notifPreviewTitle').textContent =
    `${benefitName} 마감 ${dayPreview} 전!`;

  // 날짜 칩 렌더링
  _selectedDays = existingData?.alarm_days || [7, 1];
  renderAlarmDayChips();

  // 알림 해제 버튼 표시 여부
  const offBtn = document.getElementById('alarmOffBtn');
  offBtn.style.display = existingData ? 'block' : 'none';

  const confirmBtn = document.getElementById('alarmConfirmBtn');
  confirmBtn.textContent = existingData ? '알림 변경하기' : '알림 설정하기';

  document.getElementById('alarmModal').classList.remove('hidden');
}

function renderAlarmDayChips() {
  const grid = document.getElementById('alarmDaysGrid');
  grid.innerHTML = ALARM_DAYS_META.map(m => `
    <div class="alarm-day-chip ${_selectedDays.includes(m.days) ? 'selected' : ''}"
      onclick="toggleAlarmDay(${m.days},this)">
      <div class="alarm-day-label">${m.label}</div>
      <div class="alarm-day-sub">${m.sub}</div>
    </div>
  `).join('');
}

function toggleAlarmDay(day, el) {
  const idx = _selectedDays.indexOf(day);
  if (idx > -1) {
    if (_selectedDays.length === 1) return; // 최소 1개 유지
    _selectedDays.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    _selectedDays.push(day);
    el.classList.add('selected');
  }
  // confirm 버튼 상태
  document.getElementById('alarmConfirmBtn').disabled = _selectedDays.length === 0;
}

async function doSetAlarm() {
  if (!_alarmBtn || _selectedDays.length === 0) return;
  const btn = document.getElementById('alarmConfirmBtn');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    await MateAlarm.setAlarm(
      _alarmBtn.dataset.id, _alarmBtn.dataset.name,
      _alarmBtn.dataset.deadline || null, true, [..._selectedDays]
    );
    _alarmBtn.dataset.alarmOn = 'true';
    _alarmBtn.textContent = '🔔 ON';
    document.getElementById('alarmModal').classList.add('hidden');
    showAlarmToast(_alarmBtn.dataset.name, _selectedDays);
  } catch(e) {
    btn.disabled = false; btn.textContent = '알림 설정하기';
  }
}

async function doCancelAlarm() {
  if (!_alarmBtn) return;
  try {
    await MateAlarm.setAlarm(_alarmBtn.dataset.id, _alarmBtn.dataset.name, null, false);
    _alarmBtn.dataset.alarmOn = 'false';
    _alarmBtn.textContent = '🔔 알림';
    document.getElementById('alarmModal').classList.add('hidden');
  } catch(e) {}
}

function closeAlarmModal(e) {
  if (!e || e.target.id === 'alarmModal')
    document.getElementById('alarmModal').classList.add('hidden');
}

function showAlarmToast(name, days) {
  const sorted = [...days].sort((a,b) => b-a);
  const labels = sorted.map(d => `D-${d}`).join(', ');
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#191F28;color:#fff;border-radius:12px;padding:12px 20px;font-size:13px;font-weight:500;z-index:300;white-space:nowrap;transition:all 0.3s';
  t.textContent = `🔔 ${labels} 알림이 설정되었어요`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

/* D-Day 뱃지 전체 렌더 */
function renderAllDday() {
  document.querySelectorAll('[id^="dday-"]').forEach(el => {
    const deadline = el.dataset.deadline;
    if (!deadline) { el.style.display = 'none'; return; }
    try {
      const info = MateAlarm.getDDayInfo(deadline);
      if (!info) { el.style.display = 'none'; return; }
      el.textContent = info.label;
      el.style.background = info.bg;
      el.style.color = info.color;
    } catch {}
  });
}

/* 로그인 모달 */
function goToLogin(tab) {
  document.getElementById('loginModal').classList.add('hidden');
  location.href = `login.html?redirect=result&tab=${tab}`;
}
function closeLoginModal(e) {
  if (!e || e.target.id === 'loginModal')
    document.getElementById('loginModal').classList.add('hidden');
}
</script>
